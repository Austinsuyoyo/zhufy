name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: deploy
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      # base defaults to "/" in vite.config now (subdomain root), no env needed.
      - name: Build
        run: npm run build-only
      - name: SPA fallback (vue-router history mode)
        run: printf '/* /index.html 200\n' > dist/_redirects
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: e0cebbe86089e6c1bbaad8522611012e
          command: pages deploy dist --project-name=zhufy --branch=main
